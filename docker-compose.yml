services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-peec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-peec}
      POSTGRES_DB: ${POSTGRES_DB:-peec}
    # Port 5432 intentionally NOT exposed externally
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-peec}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    environment:
      # Overrides DATABASE_URL from .env to use the db service hostname
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-peec}:${POSTGRES_PASSWORD:-peec}@db:5432/${POSTGRES_DB:-peec}
    # Port 8000 intentionally NOT exposed externally — all traffic must go through nginx
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    restart: unless-stopped

  # Caddy is the only public entry point. It reverse-proxies to web/app and
  # provisions Let's Encrypt TLS automatically when SITE_ADDRESS is a real domain.
  # Local dev: SITE_ADDRESS unset -> serves plain HTTP on :80 (no cert attempted).
  # EC2: set SITE_ADDRESS=ai-visibility.duckdns.org in .env -> auto HTTPS + redirect.
  caddy:
    build: ./caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - caddy_data:/data    # persisted certs (survive redeploys — avoids LE rate limits)
      - caddy_config:/config
    depends_on:
      - web
      - app
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
