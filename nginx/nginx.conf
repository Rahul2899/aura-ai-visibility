events {}

http {
    upstream web {
        server web:3000;
    }

    # HTTP — serves frontend on port 80.
    # After EC2 is running, add HTTPS with:
    #   sudo apt install certbot python3-certbot-nginx
    #   sudo certbot --nginx -d yourdomain.com
    # Certbot will rewrite this file and add the HTTPS server block automatically.
    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Trust only the last IP in X-Forwarded-For (the one nginx adds).
            # This prevents clients from spoofing their IP for rate limit bypass.
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
